<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dondza Abroad</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: black;
      color: white;
      background-size: contain;
      line-height: 1.6;
    }

    header {
      background-color: rgb(17, 15, 15);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 40px;
    }

    .yellow-bar {
      height: 4px;
      background-color: rgb(195, 70, 70);
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 50px;
      margin-right: 10px;
    }

    .logo-text h1 {
      font-size: 20px;
      margin: 0;
    }

    .logo-text p {
      font-size: 12px;
      color: #dcdcdc;
      margin-top: -4px;
    }

    nav {
      display: flex;
      gap: 25px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav a:hover {
      color: rgb(195, 70, 70);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: row;
      padding: 2rem;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .image-container {
      flex: 1;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .form-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-weight: bold;
    }

    input, textarea {
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      padding: 0.75rem;
      background-color: rgb(195, 70, 70);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: rgb(165, 50, 50);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    footer {
      background-color: rgb(17, 15, 15);
      padding: 25px 20px;
      text-align: center;
      color: #ccc;
      font-size: 13px;
    }

    footer a {
      color: rgb(195, 70, 70);
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .menu-toggle div {
      width: 25px;
      height: 3px;
      background-color: white;
      margin: 4px 0;
    }

    /* Mensagem de sucesso */
    #success-message {
      display: none;
      color: #4caf50;
      text-align: center;
      margin-top: 1rem;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 10px;
      background-color: #1e2a1e;
      border-radius: 6px;
      border: 1px solid #4caf50;
    }

    @media (max-width: 768px) {
      .header-top {
        flex-direction: column;
        align-items: flex-start;
        margin-left: -20px;
      }

      .menu-toggle {
        display: flex;
        position: absolute;
        top: 15px;
        right: 20px;
      }

      nav {
        display: none;
        flex-direction: column;
        width: 100%;
        padding-top: 10px;
      }

      nav.show {
        display: flex;
      }

      nav a {
        padding: 10px 0;
        font-size: 16px;
      }

      .main-content {
        flex-direction: column;
        padding: 1rem;
      }

      .image-container img {
        width: 100%;
        height: auto;
        min-height: 220px;
        object-fit: cover;
      }

      .form-container {
        padding-top: 1rem;
      }

      .logo-text {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
      }

      .logo-text h1 {
        font-size: 18px;
      }

      .logo-text p {
        font-size: 10px;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="logo">
        <img src="logo.png" alt="Logo DA" class="logo" alt="Dondza Abroad">
        <div class="logo-text">
          <h1>Dondza Abroad</h1>
          <p>"Educação sem fronteiras, oportunidades sem limites"</p>
        </div>
      </div>
      <div class="menu-toggle" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <nav id="main-nav">
        <a href="inicio.html">Início</a>
        <a href="sobrenos.html">Sobre Nós</a>
        <a href="servicos.html">Serviços</a>
        <a href="contato.html">Contacto</a>
      </nav>
    </div>
  </header>

  <div class="yellow-bar"></div>

  <div class="main-content">
    <div class="image-container">
      <img src="https://cdn.shopify.com/s/files/1/1670/2887/files/1280x400_ContactUs.jpg?v=1588299562" alt="Contacte-nos Image">
    </div>
    
    <div class="form-container">
      <h1 style="text-align: center;">Contacte-Nos</h1>
      
      <!-- Formulário com onsubmit inline para garantir que o redirecionamento seja bloqueado -->
      <form id="contact-form" 
            action="https://formsubmit.co/dondzabroad@gmail.com" 
            method="POST"
            onsubmit="return handleSubmit(event);">
        
        <!-- Desativa o Captcha -->
        <input type="hidden" name="_captcha" value="false">
        <!-- Remove o _next para evitar redirecionamento -->
        <!-- <input type="hidden" name="_next" value=""> -->
        
        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required>
      
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      
        <label for="message">Mensagem:</label>
        <textarea id="message" name="message" required></textarea>
      
        <button type="submit" id="submit-btn">Submeter</button>
      </form>
      
      <!-- Mensagem de sucesso -->
      <div id="success-message">
        ✅ A sua mensagem foi submetida com sucesso.
      </div>
    </div>
  </div>

  <br><br>
  <footer>
    &copy; 2025 Dondza Abroad. Todos os direitos reservados.
  </footer>

  <!-- JavaScript -->
  <script>
    // Função para alternar o menu mobile
    function toggleMenu() {
      var nav = document.getElementById('main-nav');
      if (nav) {
        nav.classList.toggle('show');
      }
    }

    // Função global para o evento submit (chamada pelo onsubmit inline)
    window.handleSubmit = function(event) {
      // Impede o envio tradicional
      event.preventDefault();
      event.stopPropagation();

      var form = document.getElementById('contact-form');
      var successMsg = document.getElementById('success-message');
      var submitBtn = document.getElementById('submit-btn');

      // Desabilita o botão
      submitBtn.disabled = true;
      submitBtn.textContent = 'A enviar...';

      // Cria os dados do formulário
      var formData = new FormData(form);

      // Envia via fetch
      fetch(form.action, {
        method: 'POST',
        body: formData
      })
      .then(function(response) {
        // Se a resposta for ok (status 200-299)
        if (response.ok) {
          // Exibe a mensagem de sucesso
          successMsg.style.display = 'block';
          // Limpa os campos
          form.reset();
          // Oculta a mensagem após 8 segundos
          setTimeout(function() {
            successMsg.style.display = 'none';
          }, 8000);
        } else {
          alert('Erro ao enviar. Código: ' + response.status);
        }
      })
      .catch(function(error) {
        alert('Erro de rede. Verifique sua conexão.');
        console.error('Erro no fetch:', error);
      })
      .finally(function() {
        // Reativa o botão
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submeter';
      });

      // Retorna false para garantir que o navegador não continue o envio
      return false;
    };

    // Também adiciona um listener por segurança (caso o onsubmit inline não funcione)
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('contact-form');
      if (form) {
        // Se o formulário já tiver o onsubmit, este listener complementa
        form.addEventListener('submit', function(e) {
          // Se o handleSubmit já foi chamado pelo inline, evitamos duplicar
          // Mas como o inline retorna false, o evento padrão já foi cancelado
          // Então este listener pode apenas garantir
          e.preventDefault();
          e.stopPropagation();
          // Se por algum motivo o handleSubmit não foi chamado, chamamos manualmente
          if (!window._submitting) {
            window._submitting = true;
            handleSubmit(e);
            window._submitting = false;
          }
        });
      }
    });
  </script>

</body>
</html>
